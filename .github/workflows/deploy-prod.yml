name: CD – Deploy to Prod

on:
  push:
    branches: [ main ]

jobs:
  deploy_prod:
    runs-on: ubuntu-latest
    environment: production   # protect this environment in GitHub and require reviewers

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      - name: Show CLI version
        run: databricks version || databricks -v

      - name: Validate bundle (final CI check)
        run: databricks bundle validate --target prod
        working-directory: viewcatalogtest
        env:

          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}


      - name: Install Data Contract CLI
        run: |
          python3 -m pip install 'datacontract-cli[all]'

      - name: Run Data Contract Test
        run: |
          datacontract test viewcatalogtest/datacontract.yml

      - name: Verify external_location exists in Prod metastore
        run: |
          set -euo pipefail
          echo "Checking external location: "
          databricks external-locations get '' || (echo "External location  not found. Please create it or grant CI identity permission." && exit 1)
        working-directory: viewcatalogtest
        env:

          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}


      - name: Deploy Bundle to Prod (requires environment approval)
        run: databricks bundle deploy --target prod --auto-approve
        working-directory: viewcatalogtest
        env:

          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}


      - name: Run Prod Acceptance Tests (optional / long)
        if: always()
        run: |
          # run acceptance tests or smoke jobs targeted for prod consumers
          databricks bundle run --target prod --job acceptance_test 2>&1 | tee prod_acceptance.log || true
        working-directory: viewcatalogtest
        env:

          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}


      - name: Upload prod logs
        uses: actions/upload-artifact@v4
        with:
          name: prod-logs
          path: prod_acceptance.log