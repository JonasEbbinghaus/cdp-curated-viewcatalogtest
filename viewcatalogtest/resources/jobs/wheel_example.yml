resources:
  jobs:
    wheel_example:
      name: wheel_example

      schedule:
        quartz_cron_expression: "0 0 0 * * ?"
        timezone_id: Europe/Amsterdam

      email_notifications:
        on_failure:
          - jonas.ebbinghaus@vaillant-group.com
          - other.emails@vaillant-group.com

      tasks:
        - task_key: main_task
          job_cluster_key: job_cluster
          python_wheel_task:
            package_name: viewcatalogtest
            entry_point: main
          libraries:
            - whl: ../../dist/*.whl

      job_clusters:
        - job_cluster_key: job_cluster
          new_cluster:
            spark_version: 16.4.x-scala2.12
            node_type_id: Standard_D3_v2
            num_workers: 1
