dataContractSpecification: 1.2.0
id: cdp_curated_viewcatalogtest
info:
  title: viewcatalogtest
  version: 1.0.0
  description: |
    The table contains information about products, including their identifiers, names, descriptions, and status indicators such as whether they are active or deleted.
    It also tracks creation and modification dates along with the users responsible for these actions.
    This data can be used for inventory management, product analysis, and understanding product lifecycle within the organization.
  owner: Salesforce Data Steward
  contact:
    name: John Doe (Data Product Owner) # Change to your name
    #url: ""
servers:
  development:
    type: databricks
    host: adb-1441631584157816.16.azuredatabricks.net
    catalog: viaa_structured_salesforce_dev
    schema: public
terms:
  usage: >
    Data can be used for reports, analytics and machine learning use cases.
    Order may be linked and joined by other tables
  limitations: >
    Not suitable for real-time use cases.
    PII data is masked.
  billing: free
  noticePeriod: P3M
models:
  product2:
    description: Contains product details.
    type: table
    fields:
      Id:
        description: Unique identifier for the product.
        type: string
        required: true
        unique: true
        primaryKey: true
      Name:
        description: Name of the product.
        type: string
        required: true
      ProductCode:
        description: Code representing the product.
        type: string
        required: true
      Description:
        description: Detailed description of the product.
        type: string
      IsActive:
        description: Indicates if the product is active.
        type: string
        required: true
      CreatedDate:
        description: The date and time when the product was created.
        type: string
        format: date-time
        required: true
      CreatedById:
        description: Identifier of the user who created the product.
        type: string
        required: true
      LastModifiedDate:
        description: The date and time when the product was last modified.
        type: string
        format: date-time
        required: true
      LastModifiedById:
        description: Identifier of the user who last modified the product.
        type: string
        required: true
      SystemModstamp:
        description: System timestamp for the last modification.
        type: string
        format: date-time
        required: true
      Family:
        description: Product family or category.
        type: string
      IsSerialized:
        description: Indicates if the product is serialized.
        type: string
      CurrencyIsoCode:
        description: ISO code for the currency.
        type: string
      ExternalDataSourceId:
        description: Identifier for the external data source.
        type: string
      ExternalId:
        description: External identifier for the product.
        type: string
      DisplayUrl:
        description: URL for displaying the product.
        type: string
      QuantityUnitOfMeasure:
        description: Unit of measure for the product quantity.
        type: string
      IsDeleted:
        description: Indicates if the product is deleted.
        type: string
      IsArchived:
        description: Indicates if the product is archived.
        type: string
      LastViewedDate:
        description: The date and time when the product was last viewed.
        type: string
        format: date-time
    quality:
      - type: sql
        description: Row Count
        query: |
          SELECT count(*) as row_count
          FROM viaa_structured_salesforce_dev.public.product2
        mustBeGreaterThan: 100
    examples:
